<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shader Studio</title>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <span class="brand">Shader&nbsp;Studio</span>
        <span class="hint">WebGL2 imaging pipeline</span>
        <button id="btn-import" class="ghost">Import…</button>
        <button id="btn-undo" class="ghost" title="Undo (Ctrl/Cmd+Z)">Undo</button>
        <button id="btn-redo" class="ghost" title="Redo (Ctrl/Cmd+Shift+Z)">Redo</button>
        <span class="spacer"></span>
        <button id="btn-export-png" class="primary">Export PNG</button>
        <button id="btn-export-jpg" class="ghost">Export JPG</button>
      </header>
      <aside id="toolbar"></aside>
      <main id="stage">
        <canvas id="gl"></canvas>
      </main>
      <aside id="rightpanel">
        <section id="properties"></section>
        <section id="layers"></section>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
